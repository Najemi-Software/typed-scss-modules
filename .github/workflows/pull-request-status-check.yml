name: "Pull Request ~ Status Check"

on:
    pull_request:
        branches: ["master"]
        types: [opened, synchronize, reopened, labeled, unlabeled]

concurrency:
    group: ${{ github.event.pull_request.number }}
    cancel-in-progress: true

jobs:
    dismiss-approvals:
        name: Dismiss approvals
        runs-on: ubuntu-latest
        permissions:
            pull-requests: write
        steps:
            - name: Dismiss Approvals
              uses: actions/github-script@v9.0.0
              with:
                  script: |
                      const prNumber = context.payload.pull_request.number;

                      // Get all reviews on the pull request
                      const reviews = await github.rest.pulls.listReviews({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        pull_number: prNumber,
                      });

                      // Iterate over reviews and dismiss approvals
                      for (const review of reviews.data) {
                        if (review.state === "APPROVED" && review.user.login !== "yenkins-admin") {
                          await github.rest.pulls.dismissReview({
                            owner: context.repo.owner,
                            repo: context.repo.repo,
                            pull_number: prNumber,
                            review_id: review.id,
                            message: "Approval dismissed automatically due to PR update.",
                          });
                          console.log(`Dismissed approval from ${review.user.login}`);
                        }
                      }
              env:
                  github-token: ${{secrets.GITHUB_TOKEN}}

    check-merge-commit:
        name: Check PR for merge commits
        runs-on: ubuntu-latest
        permissions:
            pull-requests: write
        steps:
            - name: Check for merge commits on PR
              env:
                  GH_TOKEN: ${{ github.token }}
                  BASE_REF: ${{ github.event.pull_request.base.ref }}
                  PR_NUMBER: ${{ github.event.pull_request.number }}
                  REPO: ${{ github.repository }}
              run: |
                  set -euo pipefail
                  MERGE_COMMITS=$(gh api "repos/${REPO}/pulls/${PR_NUMBER}/commits" --paginate \
                    --jq '.[] | select(.parents | length > 1) | "\(.sha[0:7]) \(.commit.message | split("\n")[0])"')

                  if [ -n "$MERGE_COMMITS" ]; then
                    gh pr comment "${PR_NUMBER}" \
                      --repo "${REPO}" \
                      --body "🚫 **Merge commits are not allowed on this branch. Please rebase onto \`${BASE_REF}\` instead of merging.**

                  Found merge commit(s) since branch diverged from \`${BASE_REF}\`:
                  \`\`\`
                  ${MERGE_COMMITS}
                  \`\`\`"

                    echo "::error::Merge commits detected on branch. Please rebase onto ${BASE_REF} instead of merging."
                    echo "$MERGE_COMMITS"
                    exit 1
                  fi

                  echo "No merge commits found on branch."

    lint-commit-messages:
        name: Lint Commit Messages
        runs-on: ubuntu-latest
        steps:
            - name: Checkout PR tip
              uses: actions/checkout@v7
              with:
                  ref: ${{ github.event.pull_request.head.sha }}
                  fetch-depth: 0

            - name: Lint commit messages
              shell: bash
              run: |
                  set -euo pipefail

                  HEADER_MAX_LENGTH=70
                  CONVENTIONAL_REGEX='^(feat|chore|fix)(\(.+\))?!?: .+'

                  # Walk first-parent history from the PR tip; the first merge commit
                  # is the latest master merge the branch is based on.
                  BASE_SHA=$(git rev-list --first-parent --merges -n 1 HEAD)
                  if [[ -z "$BASE_SHA" ]]; then
                    echo "::error::Reached a root commit without finding a merge commit; cannot determine the master base."
                    exit 1
                  fi

                  # All commits between the base and the PR tip (tip included, base excluded).
                  COMMITS=$(git rev-list --first-parent "${BASE_SHA}..HEAD")

                  VIOLATIONS=""
                  for COMMIT_HASH in $COMMITS; do
                    COMMIT_MESSAGE=$(git log -1 --format=%B "$COMMIT_HASH")
                    COMMIT_SUBJECT="${COMMIT_MESSAGE%%$'\n'*}"
                    COMMIT_VIOLATIONS=""

                    if ! [[ "$COMMIT_SUBJECT" =~ $CONVENTIONAL_REGEX ]]; then
                      COMMIT_VIOLATIONS+=":x: subject must match \`(feat|chore|fix)(scope)?!?: ...\`\n"
                    fi

                    if (( ${#COMMIT_SUBJECT} > HEADER_MAX_LENGTH )); then
                      COMMIT_VIOLATIONS+=":x: exceeds ${HEADER_MAX_LENGTH} characters\n"
                    fi

                    if [[ -n "$COMMIT_VIOLATIONS" ]]; then
                      VIOLATIONS+="\`${COMMIT_HASH:0:7} ${COMMIT_SUBJECT}\`\n${COMMIT_VIOLATIONS}\n"
                    fi
                  done

                  {
                    echo "## Commit Lint Results"
                    if [[ -n "$VIOLATIONS" ]]; then
                      echo "### Violations"
                      echo -e "$VIOLATIONS"
                    else
                      echo ":white_check_mark: All commit messages follow the guidelines."
                    fi
                  } >> "$GITHUB_STEP_SUMMARY"

                  if [[ -n "$VIOLATIONS" ]]; then
                    echo -e "$VIOLATIONS"
                    exit 1
                  fi

                  echo "All commit messages follow the guidelines."

    check-pr-labels:
        name: Check PR labels
        runs-on: ubuntu-latest
        outputs:
            has-skip-publish-label: ${{ steps.check-pr-label.outputs.has-skip-publish-label }}
        permissions:
            pull-requests: read
        steps:
            - name: Check for 'skip publish' label
              id: check-pr-label
              env:
                  GH_TOKEN: ${{ github.token }}
                  REPO: ${{ github.repository }}
                  PR_NUMBER: ${{ github.event.pull_request.number }}
              run: |
                  set -euo pipefail
                  has_label=$(gh api "repos/${REPO}/issues/${PR_NUMBER}/labels" --jq 'map(.name) | any(. == "skip publish")')
                  echo "has-skip-publish-label=${has_label}" >> "$GITHUB_OUTPUT"
                  echo "PR has 'skip publish' label: ${has_label}"

    get-release-tags:
        name: "Get latest GH release's tag"
        runs-on: ubuntu-latest
        outputs:
            latest: ${{ steps.latest-release.outputs.version }}
            master: ${{ steps.master-release.outputs.version }}
        steps:
            - name: Get latest release version
              id: latest-release
              env:
                  GH_TOKEN: ${{ github.token }}
                  REPO: ${{ github.repository }}
              run: |
                  set -euo pipefail
                  tag="$(gh api "repos/${REPO}/releases/latest" --jq '.tag_name')"
                  echo "version=${tag}" >> "$GITHUB_OUTPUT"
                  echo "Latest release: ${tag}"

            - name: Checkout master
              uses: actions/checkout@v7
              with:
                  ref: master
                  fetch-depth: 0
                  # Full history but no file contents; the tag walk below only
                  # needs commits and tags, so this stays fast as the repo grows.
                  filter: blob:none

            - name: Get latest release in master's history
              id: master-release
              env:
                  GH_TOKEN: ${{ github.token }}
                  REPO: ${{ github.repository }}
              run: |
                  set -euo pipefail
                  # The latest tag on master's first-parent line. Tags orphaned
                  # by a git scrub / force-push are unreachable from master and
                  # therefore never match.
                  if ! tag="$(git describe --tags --first-parent --abbrev=0 HEAD 2>/dev/null)"; then
                    echo "::error::No release tag found in master's git history"
                    exit 1
                  fi

                  # A stray tag without a GitHub release must not satisfy this
                  # check.
                  if ! gh api "repos/${REPO}/releases/tags/${tag}" --jq '.tag_name' > /dev/null 2>&1; then
                    echo "::error::Tag ${tag} is the latest in master's git history but has no GitHub release"
                    exit 1
                  fi

                  # Same walk without local git (pure gh api), kept for reference
                  # in case the master checkout is ever removed:
                  #
                  # tag_map="$(gh api "repos/${REPO}/tags" --paginate --jq '.[] | "\(.commit.sha) \(.name)"')"
                  # current="$(gh api "repos/${REPO}/commits/master" --jq '.sha')"
                  # tag=""
                  # for _ in $(seq 1 100); do # depth cap: fail instead of walking a tagless history to the root
                  #   tag="$(printf '%s\n' "$tag_map" | awk -v sha="$current" '$1 == sha { print $2; exit }')"
                  #   [ -n "$tag" ] && break
                  #   current="$(gh api "repos/${REPO}/commits/${current}" --jq '.parents[0].sha')"
                  # done

                  echo "version=${tag}" >> "$GITHUB_OUTPUT"
                  echo "Latest release in master's history: ${tag}"

    calculate-next-release-version:
        name: Calculate next release version
        needs: [check-pr-labels, get-release-tags]
        runs-on: ubuntu-latest
        permissions:
            contents: read
            pull-requests: read
        outputs:
            bump: ${{ steps.detect-bump.outputs.bump }}
            base-sha: ${{ steps.detect-bump.outputs.base-sha }}
            head-sha: ${{ steps.detect-bump.outputs.head-sha }}
            publish: ${{ steps.gate.outputs.publish }}
            reason: ${{ steps.gate.outputs.reason }}
            version: ${{ steps.next-version.outputs.version }}
        steps:
            - name: Checkout PR tip
              uses: actions/checkout@v7
              with:
                  ref: ${{ github.event.pull_request.head.sha }}

            - name: Detect bump
              id: detect-bump
              uses: ./.github/actions/versioning/detect-bump
              with:
                  pr-number: ${{ github.event.pull_request.number }}

            - name: Decide whether to publish
              id: gate
              env:
                  HAS_SKIP_LABEL: ${{ needs.check-pr-labels.outputs.has-skip-publish-label }}
                  SAME_REPO: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
              run: |
                  set -euo pipefail
                  if [ "$HAS_SKIP_LABEL" = "true" ]; then
                    publish=false; reason="PR has the 'skip publish' label"
                  elif [ "$SAME_REPO" != "true" ]; then
                    publish=false; reason="fork PR, no access to publish secrets"
                  else
                    publish=true; reason="all conditions met"
                  fi
                  echo "publish=${publish}" >> "$GITHUB_OUTPUT"
                  echo "reason=${reason}" >> "$GITHUB_OUTPUT"
                  echo "Publish alpha: ${publish} (${reason})"

            - name: Calculate next release version
              id: next-version
              uses: ./.github/actions/versioning/calculate-next-version
              with:
                  latest-version: ${{ needs.get-release-tags.outputs.latest }}
                  bump: ${{ steps.detect-bump.outputs.bump }}

    check-changelog:
        name: Check CHANGELOG.md
        needs: [check-pr-labels, get-release-tags, calculate-next-release-version]
        if: ${{ needs.check-pr-labels.outputs.has-skip-publish-label == 'false' }}
        runs-on: ubuntu-latest
        permissions:
            contents: read
        steps:
            - name: Checkout
              uses: actions/checkout@v7
              with:
                  ref: ${{ github.event.pull_request.head.sha }}

            - name: Check if CHANGELOG.md has been modified
              id: paths-filter
              uses: dorny/paths-filter@v4.0.2
              with:
                  filters: |
                      changelog_changed:
                          - 'CHANGELOG.md'

            - name: Fail if CHANGELOG.md has not been modified
              env:
                  CHANGELOG_CHANGED: ${{ steps.paths-filter.outputs.changelog_changed }}
              run: |
                  set -euo pipefail
                  if [ "$CHANGELOG_CHANGED" = "false" ]; then
                    echo "::error::Changelog has not been updated. Add an entry to CHANGELOG.md or apply the 'skip publish' label if your PR doesn't require a new release (and version bump) to be made."
                    exit 1
                  fi
                  echo "CHANGELOG.md has been modified."

            - name: Verify bracketed references have link definitions
              run: |
                  FILE="CHANGELOG.md"
                  echo "Checking that every [reference] in $FILE has a matching [reference]: link definition..."

                  # Collect defined link labels: lines like "[label]: https://..."
                  grep -oE '^\[[^]]+\]:' "$FILE" | sed 's/:$//' | sort -u > /tmp/changelog-defs.txt

                  # Collect used link references:
                  #   - strip inline code spans `…` so bracketed expressions inside
                  #     code (e.g. Go map indices like `m["key"]`) don't count
                  #   - strip inline links of the form [text](url) so they don't count
                  #   - drop the definition lines themselves
                  #   - extract remaining [name] occurrences
                  sed -E 's/`[^`]*`//g' "$FILE" \
                    | sed -E 's/\[([^]]+)\]\([^)]*\)//g' \
                    | grep -vE '^\[[^]]+\]:' \
                    | grep -oE '\[[^]]+\]' \
                    | sort -u > /tmp/changelog-refs.txt

                  missing=$(comm -23 /tmp/changelog-refs.txt /tmp/changelog-defs.txt)

                  if [ -n "$missing" ]; then
                    echo "❌ The following bracketed references have no matching link definition at the bottom of the file:"
                    echo "$missing" | sed 's/^/  - /'
                    echo ""
                    echo "Add a definition for each, e.g.:"
                    echo "  [12.0.0]: https://github.com/Najemi-Software/typed-scss-modules/compare/v10.11.1...v12.0.0"
                    exit 1
                  fi

                  echo "✅ All bracketed references have link definitions"

            - name: Check format of all 'Heading 2's
              run: |
                  set -euo pipefail
                  FILE="CHANGELOG.md"
                  echo "Checking that every 'Heading 2' in $FILE matches '## [VERSION] - YYYY-MM-DD'..."

                  invalid="$(grep -nE '^## ' "$FILE" \
                    | grep -vE '^[0-9]+:## \[[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*)?(\+[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*)?\] - [0-9]{4}-[0-9]{2}-[0-9]{2}$' \
                    || true)"

                  if [ -n "$invalid" ]; then
                    echo "❌ The following 'Heading 2' lines do not match '## [VERSION] - YYYY-MM-DD':"
                    echo "$invalid" | sed 's/^/  - line /'
                    exit 1
                  fi

                  echo "✅ All 'Heading 2's match '## [VERSION] - YYYY-MM-DD'"

            - name: Check new 'Heading 2' matches the next release version
              env:
                  NEXT_VERSION: ${{ needs.calculate-next-release-version.outputs.version }}
              run: |
                  set -euo pipefail
                  echo "Checking that the newest 'Heading 2' in CHANGELOG.md is for version ${NEXT_VERSION}..."

                  # Get version from the first 'Heading 2' in CHANGELOG.md
                  PR_VERSION=$(grep -m1 -oE '^## \[[^]]+\]' CHANGELOG.md | sed -E 's/^## \[([^]]+)\]/\1/')
                  echo "Version in PR: $PR_VERSION"

                  if [ "$PR_VERSION" != "$NEXT_VERSION" ]; then
                    echo "❌ The newest CHANGELOG.md entry is for version ${PR_VERSION}, but merging this PR will release ${NEXT_VERSION} (based on the detected bump)."
                    echo "Please retitle the newest CHANGELOG.md entry to [${NEXT_VERSION}] (and update its link definition)."
                    exit 1
                  fi

                  echo "✅ Newest CHANGELOG.md entry matches the next release version (${NEXT_VERSION})"

            - name: Check version bump
              env:
                  MASTER_RELEASE_TAG: ${{ needs.get-release-tags.outputs.master }}
              run: |
                  set -euo pipefail
                  echo "Checking if the CHANGELOG.md version has been bumped..."

                  # Get version from master's latest release (strip the leading 'v')
                  MASTER_VERSION="${MASTER_RELEASE_TAG#v}"
                  echo "Version on master: $MASTER_VERSION"

                  # Get version from the first 'Heading 2' in CHANGELOG.md
                  PR_VERSION=$(grep -m1 -oE '^## \[[^]]+\]' CHANGELOG.md | sed -E 's/^## \[([^]]+)\]/\1/')
                  echo "Version in PR: $PR_VERSION"

                  # Compare versions: PR_VERSION must be strictly greater than MASTER_VERSION
                  if [ "$MASTER_VERSION" = "$PR_VERSION" ]; then
                    echo "❌ Version has not been bumped!"
                    echo "Current version on master: $MASTER_VERSION"
                    echo "Please add a CHANGELOG.md entry with a new version number"
                    exit 1
                  fi

                  HIGHEST=$(printf '%s\n%s\n' "$MASTER_VERSION" "$PR_VERSION" | sort -V | tail -n1)
                  if [ "$HIGHEST" != "$PR_VERSION" ]; then
                    echo "❌ PR version ($PR_VERSION) is lower than master version ($MASTER_VERSION)"
                    echo "Please add a CHANGELOG.md entry with a version greater than $MASTER_VERSION"
                    exit 1
                  fi

                  echo "✅ Version has been bumped from $MASTER_VERSION to $PR_VERSION"

    build-validate-test:
        name: Build, Validate & Test
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v7

            - name: Setup pnpm
              uses: pnpm/action-setup@v4

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: 22
                  cache: "pnpm"

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Build
              run: pnpm run build

            - name: Validate
              run: pnpm run validate

            - name: Test
              run: pnpm run test-once

    publish-alpha:
        name: Publish alpha version
        needs: [get-release-tags, calculate-next-release-version, check-changelog, build-validate-test]
        runs-on: ubuntu-latest
        permissions:
            contents: read
            pull-requests: write
        steps:
            - name: Checkout PR tip
              uses: actions/checkout@v7
              with:
                  ref: ${{ github.event.pull_request.head.sha }}

            - name: Comment bump on PR
              env:
                  GH_TOKEN: ${{ github.token }}
                  PR_NUMBER: ${{ github.event.pull_request.number }}
                  BUMP: ${{ needs.calculate-next-release-version.outputs.bump }}
                  HEAD_SHA: ${{ needs.calculate-next-release-version.outputs.head-sha }}
                  PUBLISH: ${{ needs.calculate-next-release-version.outputs.publish }}
                  REASON: ${{ needs.calculate-next-release-version.outputs.reason }}
              run: |
                  set -euo pipefail
                  if [ "$PUBLISH" = "true" ]; then
                    body="🔖 Version bump detected for \`${HEAD_SHA}\`: **${BUMP}** — merging this PR will release a ${BUMP} version. An alpha will be published for this PR."
                  else
                    body="🔖 Version bump detected for \`${HEAD_SHA}\`: **${BUMP}**, but no alpha will be published for this PR (${REASON})."
                  fi
                  gh pr comment "$PR_NUMBER" --body "$body"

            - name: Ensure master's latest release in git history
              if: ${{ needs.calculate-next-release-version.outputs.publish == 'true' }}
              env:
                  GH_TOKEN: ${{ github.token }}
                  REPO: ${{ github.repository }}
                  RELEASE_TAG: ${{ needs.get-release-tags.outputs.master }}
                  BASE_SHA: ${{ needs.calculate-next-release-version.outputs.base-sha }}
              run: |
                  set -euo pipefail
                  status="$(gh api "repos/${REPO}/compare/${RELEASE_TAG}...${BASE_SHA}" --jq '.status')"
                  case "$status" in
                    identical|ahead)
                      echo "Base ${BASE_SHA} is at or after master's latest release ${RELEASE_TAG} (status: ${status})."
                      ;;
                    *)
                      echo "::error::PR base ${BASE_SHA} predates or diverged from master's latest release ${RELEASE_TAG} (status: ${status}). Rebase onto master."
                      exit 1
                      ;;
                  esac

            - name: Setup pnpm
              uses: pnpm/action-setup@v4

            - name: Setup Node.js
              if: ${{ needs.calculate-next-release-version.outputs.publish == 'true' }}
              uses: actions/setup-node@v7
              with:
                  node-version: 22
                  cache: "pnpm"

            - name: Calculate next alpha version
              id: next-version
              if: ${{ needs.calculate-next-release-version.outputs.publish == 'true' }}
              uses: ./.github/actions/versioning/calculate-next-version
              with:
                  latest-version: ${{ needs.get-release-tags.outputs.latest }}
                  bump: ${{ needs.calculate-next-release-version.outputs.bump }}
                  pr-number: ${{ github.event.pull_request.number }}

            - name: Install dependencies and build the package (implicitly via the "prepare" script)
              if: ${{ needs.calculate-next-release-version.outputs.publish == 'true' }}
              run: pnpm install --frozen-lockfile

            - name: Set version
              if: ${{ needs.calculate-next-release-version.outputs.publish == 'true' }}
              uses: ./.github/actions/versioning/set-version
              with:
                  version: ${{ steps.next-version.outputs.version }}

            - name: Publish to npm
              id: npm-publish
              if: ${{ needs.calculate-next-release-version.outputs.publish == 'true' }}
              uses: ./.github/actions/publishing/npm-publish
              with:
                  npm-token: ${{ secrets.NPM_TOKEN }}

            - name: Comment install instructions on PR
              if: ${{ needs.calculate-next-release-version.outputs.publish == 'true' }}
              env:
                  GH_TOKEN: ${{ github.token }}
                  PR_NUMBER: ${{ github.event.pull_request.number }}
                  VERSION: ${{ steps.npm-publish.outputs.version }}
                  DIST_TAG: ${{ steps.npm-publish.outputs.dist-tag }}
              run: |
                  set -euo pipefail
                  pkg="$(pnpm pkg get name | tr -d '"')"
                  gh pr comment "$PR_NUMBER" --body "📦 Published \`${pkg}@${VERSION}\` — try it with:
                  \`\`\`bash
                  npm i ${pkg}@${DIST_TAG}
                  \`\`\`
                  or
                  \`\`\`bash
                  npm i ${pkg}@${VERSION}
                  \`\`\`"

    status-check:
        name: Status Check
        if: ${{ !cancelled() }}
        needs:
            - dismiss-approvals
            - check-merge-commit
            - lint-commit-messages
            - check-pr-labels
            - get-release-tags
            - check-changelog
            - build-validate-test
            - calculate-next-release-version
            - publish-alpha
        runs-on: ubuntu-latest
        steps:
            - name: Decide whether the needed jobs succeeded or failed
              uses: re-actors/alls-green@v1.2.2
              with:
                  allowed-skips: ${{ toJSON(needs) }}
                  jobs: ${{ toJSON(needs) }}
